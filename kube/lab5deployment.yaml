---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-service-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend-service-app
  template:
    metadata:
      labels:
        app: frontend-service-app
    spec:
      containers:
        - name: frontend-service-app
          image: jashanpratapsingh/coe692-lab5:frontend-service-app-v3
          imagePullPolicy: IfNotPresent
          env:
            - name: FRONTEND_DB_HOST
              value: frontend-service-db
            - name: FRONTEND_DB_PORT
              value: "3306"
            - name: FRONTEND_DB_NAME
              value: Frontend_Rental_Lab5_DB
            - name: FRONTEND_DB_USER
              valueFrom:
                secretKeyRef:
                  name: lab5-secrets
                  key: DB_USER
            - name: FRONTEND_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: lab5-secrets
                  key: DB_PASSWORD
          ports:
            - containerPort: 8080
        - name: frontend-gateway
          image: nginx:1.27-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
          volumeMounts:
            - name: frontend-gateway-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
      volumes:
        - name: frontend-gateway-config
          configMap:
            name: frontend-gateway-nginx
