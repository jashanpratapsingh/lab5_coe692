          image: jashanpratapsingh/coe692-lab5:frontend-service-db
          imagePullPolicy: IfNotPresent
          env:
            - name: MYSQL_ROOT_PASSWORD
              value: lab5_root
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: lab5-secrets
                  key: DB_USER
