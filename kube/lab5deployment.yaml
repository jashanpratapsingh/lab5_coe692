apiVersion: v1
kind: Secret
metadata:
  name: lab5-secrets
type: Opaque
stringData:
  DB_USER: lab5_user
  DB_PASSWORD: lab5_pass
  JWT_SECRET: dev-lab5-jwt-secret-dev-lab5-jwt-secret
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: lab5-config
data:
  KUBEMQ_ADDRESS: kubemq-service:50000
  RESERVATION_EVENT_CHANNEL: reservation-events
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service-db
  template:
    metadata:
      labels:
        app: auth-service-db
    spec:
      containers:
        - name: auth-service-db
          image: jashanpratapsingh/coe692-lab5:auth-service-db
          imagePullPolicy: IfNotPresent
          env:
            - name: MYSQL_ROOT_PASSWORD
              value: lab5_root
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: lab5-secrets
                  key: DB_USER
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: lab5-secrets
                  key: DB_PASSWORD
          ports:
            - containerPort: 3306
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service-app
  template:
    metadata:
      labels:
        app: auth-service-app
    spec:
      containers:
        - name: auth-service-app
          image: jashanpratapsingh/coe692-lab5:auth-service-app-v3
          imagePullPolicy: IfNotPresent
          env:
            - name: AUTH_DB_HOST
              value: auth-service-db
            - name: AUTH_DB_PORT
              value: "3306"
            - name: AUTH_DB_NAME
              value: Auth_Rental_Lab5_DB
            - name: AUTH_DB_USER
              valueFrom:
                secretKeyRef:
                  name: lab5-secrets
                  key: DB_USER
            - name: AUTH_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: lab5-secrets
                  key: DB_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: lab5-secrets
                  key: JWT_SECRET
          ports:
            - containerPort: 8080
---
